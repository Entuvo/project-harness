name: Claude PR Review

# Automatic code review: every opened or updated pull request gets one Claude
# review pass focused on this project's own bar — that new guards ship a plant
# test, diffs are surgical, and docs stay in sync. Runs on the Claude subscription.
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review the pull request
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} against
            this project's contribution bar (see CONTRIBUTING.md and the README
            design principles). Focus on:
            - Every new rule has an executed backstop; every new guard/hook ships
              a plant test in scripts/harness_selftest.py that provably fires.
            - The diff is surgical — each changed line traces to the stated goal.
            - No copied text between docs (one source of truth per fact).
            - SKILL.md / references / README updated when behavior changed.
            - Python stays standard-library only.

            Post one review comment summarizing findings, ranked by risk. If the
            change looks solid, say so briefly. Do not push commits.
          claude_args: |
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)"
        env:
          GH_TOKEN: ${{ github.token }}
